name: CodeQL

# GitHub-native static analysis (SAST). Free for public repositories. Findings
# appear under the repo's Security → Code scanning tab and annotate PRs.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly full scan (Mondays 07:00 UTC) to catch newly published query rules
    # even when nothing changed in the code.
    - cron: "0 7 * * 1"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required to upload results to code scanning
      actions: read

    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # security-extended adds higher-signal security queries beyond the
          # default set; drop to "security" if it gets too noisy.
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
