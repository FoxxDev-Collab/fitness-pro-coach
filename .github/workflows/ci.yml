name: CI

# Fast quality gate that Vercel does NOT run: ESLint, TypeScript, and the
# vitest suite. Vercel already runs `next build` + `prisma migrate deploy` on
# every push and PR preview, so this workflow deliberately does not rebuild —
# it catches lint/type/test regressions before they reach master.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Newer pushes to the same branch cancel in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm ci` runs the `postinstall` hook, which runs `prisma generate` and
      # produces the client types that the typecheck step depends on. No live
      # database is contacted — generation is offline.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    # Non-blocking: surfaces vulnerable runtime deps in the log without failing
    # the build. Dependabot (see .github/dependabot.yml) opens the actual fix
    # PRs; this is an at-a-glance signal on every run.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production deps, high and above)
        run: npm audit --omit=dev --audit-level=high
